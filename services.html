<!DOCTYPE html>
<html lang="en">

<head id="head"></head>
<script>
  fetch('head.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('head').innerHTML = data;
    });
  fetch('header.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('header').innerHTML = data;

      const elements = document.getElementsByClassName('services');

      for (let i = 0; i < elements.length; i++) {
          elements[i].classList.add('active');
      }
    });
</script>

<body>

  <!-- ======= Header ======= -->
  <header id="header" class="header d-flex align-items-center">
  </header><!-- End Header -->

  <main id="main">

    <!-- ======= Breadcrumbs ======= -->
    <div class="breadcrumbs d-flex align-items-center" style="background-image: url('assets/img/breadcrumbs-bg.jpg');">
      <div class="container position-relative d-flex flex-column align-items-center" data-aos="fade">

        <h2>Công bố năng lực</h2>
        <ol>
          <li><a href="index.html">Trang chủ</a></li>
          <li>Công bố năng lực</li>
        </ol>

      </div>
    </div><!-- End Breadcrumbs -->

    <!-- ======= Testimonials Section ======= -->
    <section id="testimonials" class="testimonials section-bg">
      <div class="container" data-aos="fade-up">
        <div class="section-header">
          <h2>Công bố năng lực</h2>
          <p>Công ty TNHH Tư vấn và Đầu tư Xây dựng Tấn Phát Hưng Yên công khai chứng chỉ, giấy chứng nhận được cấp phép</p>
        </div>
        <div class="slides-2 swiper">
          <div class="swiper-wrapper">
          </div>
          <div class="swiper-pagination"></div>
        </div>
      </div>
    </section>

  <footer id="footer" class="footer"></footer>

  <a href="#" class="scroll-top d-flex align-items-center justify-content-center"><i
      class="bi bi-arrow-up-short"></i></a>

  <div id="preloader"></div>

  <!-- Vendor JS Files -->
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="assets/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="assets/vendor/php-email-form/validate.js"></script>

  <!-- Template Main JS File -->
  <script src="assets/js/main.js"></script>
  <script>
    fetch('footer.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      });

    fetch('assets/img/documents/images.json')
      .then(res => res.json())
      .then(images => {
        const wrapper = document.querySelector('.swiper-wrapper');

        images.forEach(img => {
          const slide = document.createElement('div');
          slide.className = 'swiper-slide';

          slide.innerHTML = `
              <div class="testimonial-wrap">
                <div class="testimonial-item">
                  <div>
                    <img src="assets/img/documents/${img}" class="testimonial-img" alt=""/>
                  </div>
                </div>
              </div>
          `;

          wrapper.appendChild(slide);
        });
      });
  </script>
</body>

</html>
